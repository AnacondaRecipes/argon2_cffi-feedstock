{% set name = "argon2-cffi" %}
{% set version = "25.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: 694ae5cc8a42f4c4e2bf2ca0e64e51e23a040c6a517a85074683d3959e1346c1

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<38]

requirements:
  host:
    - pip
    - python
    - hatchling
    - hatch-vcs
    - hatch-fancy-pypi-readme
  run:
    - python
    - argon2-cffi-bindings
  run_constrained:
    # avoiding argon2-cffi and argon2_cffi to be installed in parallel
    - argon2_cffi ==999

test:
  source_files:
    - tests
  imports:
    - argon2
  commands:
    - pip check
    - pytest -v tests
  requires:
    - pip
    - pytest
    - hypothesis

about:
  home: https://argon2-cffi.readthedocs.org
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: The secure Argon2 password hashing algorithm.
  description: |
    Argon2 won the Password Hashing Competition and argon2_cffi is the simplest
    way to use it in Python and PyPy
  doc_url: https://argon2-cffi.readthedocs.io
  dev_url: https://github.com/hynek/argon2_cffi

extra:
  recipe-maintainers:
    - stuertz
